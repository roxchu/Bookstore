<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olvidé mi contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep:   #1a3d2b;
            --green-mid:    #2d6a4f;
            --green-accent: #52b788;
            --cream:        #f8f5ef;
            --text-dark:    #1a2e1e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, var(--green-deep) 0%, var(--green-mid) 100%);
            color: var(--text-dark);
        }
        .card {
            width: 360px;
            background: white;
            padding: 2.2rem;
            border-radius: 9px;
            box-shadow: 0 8px 36px rgba(0,0,0,.2);
        }
        .card h1 { margin-bottom: 1rem; font-size: 1.5rem; color: var(--green-deep); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 700; margin-bottom: .35rem; }
        input { width: 100%; padding: .65rem .75rem; border: 1px solid #bdbdbd; border-radius: 4px; }
        button { width: 100%; background: var(--green-deep); color: white; border: none; padding: .7rem; border-radius: 4px; cursor: pointer; }
        .field-error { margin-top: .5rem; color: #c0392b; min-height: 1.2rem; }
        .alert-success { margin-top: .6rem; color: #1a6c3a; }
        .link-back { margin-top: .85rem; display: block; text-align: center; color: var(--green-deep); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Olvidé mi contraseña</h1>
        <p>Ingresá el email con el que te registraste.</p>
        <div class="form-group">
            <label for="fp_email">Email</label>
            <input type="email" id="fp_email" placeholder="tu@email.com">
            <div id="fp_error" class="field-error"></div>
            <div id="fp_success" class="alert-success"></div>
        </div>
        <button onclick="handleOlvideContrasenia()">Enviar correo</button>
        <a class="link-back" href="login.html">← Volver al login</a>
    </div>

    <script>
        function handleOlvideContrasenia() {
            document.getElementById('fp_error').textContent = '';
            document.getElementById('fp_success').textContent = '';
            const email = document.getElementById('fp_email').value.trim();
            if (!email) {
                document.getElementById('fp_error').textContent = 'Ingresá tu email.';
                return;
            }
            fetch('olvideContrasenia.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ email: email })
            })
            .then(r => r.json())
            .then(resp => {
                if (resp.success) {
                    document.getElementById('fp_success').textContent = resp.message;
                } else {
                    document.getElementById('fp_error').textContent = resp.message;
                }
            })
            .catch(err => {
                document.getElementById('fp_error').textContent = 'Error de conexión: ' + err.message;
            });
        }
    </script>
</body>
</html>
