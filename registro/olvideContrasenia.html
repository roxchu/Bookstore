<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olvidé mi contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_registro/olvidecontrasenia.css">
</head>
<body>
    <div class="card">
        <h1>Olvidé mi contraseña</h1>
        <p>Ingresá el email con el que te registraste.</p>
        <div class="form-group">
            <label for="fp_email">Email</label>
            <input type="email" id="fp_email" placeholder="tu@email.com">
            <div id="fp_error" class="field-error"></div>
            <div id="fp_success" class="alert-success"></div>
        </div>
        <button onclick="handleOlvideContrasenia()">Enviar correo</button>
        <a class="link-back" href="login.html">← Volver al login</a>
    </div>

    <script>
        function handleOlvideContrasenia() {
            document.getElementById('fp_error').textContent = '';
            document.getElementById('fp_success').textContent = '';
            const email = document.getElementById('fp_email').value.trim();
            if (!email) {
                document.getElementById('fp_error').textContent = 'Ingresá tu email.';
                return;
            }
            fetch('olvideContrasenia.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ email: email })
            })
            .then(r => r.json())
            .then(resp => {
                if (resp.success) {
                    document.getElementById('fp_success').textContent = resp.message;
                } else {
                    document.getElementById('fp_error').textContent = resp.message;
                }
            })
            .catch(err => {
                document.getElementById('fp_error').textContent = 'Error de conexión: ' + err.message;
            });
        }
    </script>
</body>
</html>
