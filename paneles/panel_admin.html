<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — Bookstore</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-deep: #1a3d2b;
            --green-mid: #2d6a4f;
            --green-accent: #52b788;
            --green-light: #b7e4c7;
            --green-pale: #d8f3dc;
            --cream: #f8f5ef;
            --gold: #c9a84c;
            --red: #c0392b;
            --red-light: #f8d7da;
            --text-dark: #1a2e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: #f0f4f1;
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--green-deep);
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--cream);
            letter-spacing: 2px;
        }

        .logo-sub {
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-badge {
            background: var(--gold);
            color: var(--green-deep);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 2px;
        }

        .back-btn {
            background: transparent;
            color: var(--cream);
            border: 1.5px solid var(--green-accent);
            padding: 0.5rem 1.2rem;
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--green-accent);
            color: var(--green-deep);
        }

        /* LAYOUT */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--green-deep);
            margin-bottom: 0.3rem;
        }

        .page-divider {
            width: 50px;
            height: 3px;
            background: var(--gold);
            margin-bottom: 2rem;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 4px;
            padding: 1.5rem;
            border-left: 4px solid var(--gold);
            box-shadow: 0 2px 12px rgba(26,61,43,0.07);
        }

        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--green-deep);
            font-weight: 700;
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 0.6rem 1rem;
            border: 1.5px solid var(--green-pale);
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            width: 280px;
            transition: border-color 0.3s;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--green-accent);
        }

        .btn-primary {
            background: var(--green-deep);
            color: var(--cream);
            border: none;
            padding: 0.65rem 1.5rem;
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover { background: var(--green-mid); }

        /* TABLE */
        .table-wrap {
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 16px rgba(26,61,43,0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--green-deep);
        }

        thead th {
            padding: 1rem 1.2rem;
            text-align: left;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--green-light);
            font-weight: 400;
        }

        tbody tr {
            border-bottom: 1px solid var(--green-pale);
            transition: background 0.2s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f6faf7; }

        tbody td {
            padding: 0.9rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text-dark);
            vertical-align: middle;
        }

        .td-price {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--green-mid);
        }

        .stock-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .stock-ok { background: var(--green-pale); color: var(--green-mid); }
        .stock-low { background: #fff3cd; color: #856404; }
        .stock-zero { background: var(--red-light); color: var(--red); }

        .actions { display: flex; gap: 0.5rem; }

        .btn-edit, .btn-delete {
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 3px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-edit {
            background: var(--green-pale);
            color: var(--green-mid);
        }

        .btn-edit:hover { background: var(--green-accent); color: white; }

        .btn-delete {
            background: var(--red-light);
            color: var(--red);
        }

        .btn-delete:hover { background: var(--red); color: white; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #aaa;
            font-size: 0.95rem;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,61,43,0.55);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: white;
            border-radius: 6px;
            width: 480px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: modalIn 0.25s ease;
            overflow: hidden;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.93) translateY(-20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            background: var(--green-deep);
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            font-size: 1.2rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--cream);
            font-size: 1.3rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-body { padding: 1.8rem 1.5rem; }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #ddd;
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--green-accent);
        }

        .form-group textarea { resize: vertical; min-height: 90px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--green-pale);
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .btn-cancel {
            background: transparent;
            color: #888;
            border: 1.5px solid #ddd;
            padding: 0.6rem 1.3rem;
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover { border-color: #aaa; color: #555; }

        /* CONFIRM MODAL */
        .confirm-modal {
            background: white;
            border-radius: 6px;
            width: 380px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: modalIn 0.25s ease;
            overflow: hidden;
        }

        .confirm-body {
            padding: 2rem 1.5rem 1rem;
            text-align: center;
        }

        .confirm-icon { font-size: 3rem; margin-bottom: 1rem; }

        .confirm-body h3 {
            font-family: 'Playfair Display', serif;
            color: var(--green-deep);
            margin-bottom: 0.5rem;
        }

        .confirm-body p { color: #666; font-size: 0.9rem; }

        .confirm-footer {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: center;
            gap: 0.8rem;
        }

        .btn-danger {
            background: var(--red);
            color: white;
            border: none;
            padding: 0.65rem 1.5rem;
            border-radius: 3px;
            font-family: 'Lato', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-danger:hover { background: #a93226; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--green-mid);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 3px;
            font-size: 0.9rem;
            transition: transform 0.3s ease;
            z-index: 9999;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--red); }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #aaa;
        }

        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid var(--green-pale);
            border-top-color: var(--green-accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 0.8rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 700px) {
            .stats-row { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
            thead th:nth-child(2), tbody td:nth-child(2) { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span class="logo-main">Bookstore</span>
        <span class="logo-sub">Panel de Administración</span>
    </div>
    <div class="header-right">
        <span class="admin-badge">Admin</span>
        <a href="index.php" class="back-btn">← Volver</a>
    </div>
</header>

<div class="container">
    <h1 class="page-title">Gestión de Productos</h1>
    <div class="page-divider"></div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Productos</div>
            <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sin Stock</div>
            <div class="stat-value" id="stat-zero">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Stock Bajo (≤5)</div>
            <div class="stat-value" id="stat-low">—</div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nombre..." oninput="filterTable()">
        <button class="btn-primary" onclick="openCreateModal()">+ Nuevo Producto</button>
    </div>

    <div class="table-wrap">
        <div id="tableContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando productos...</p>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="formModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Nuevo Producto</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="productId">
            <div class="form-group">
                <label>Nombre del libro</label>
                <input type="text" id="prodNombre" placeholder="Ej: El nombre del viento">
            </div>
            <div class="form-group">
                <label>Detalle / Descripción</label>
                <textarea id="prodDetalle" placeholder="Breve descripción del libro..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Precio ($)</label>
                    <input type="number" id="prodPrecio" placeholder="0" min="0" step="1">
                </div>
                <div class="form-group">
                    <label>Stock (unidades)</label>
                    <input type="number" id="prodStock" placeholder="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <label>Género / Categoría</label>
                <select id="prodGenero" required>
                    <option value="">Seleccione un género...</option>
                    <option value="1">Fantasía</option>
                    <option value="2">Terror</option>
                    <option value="3">Romance</option>
                    <option value="4">Ciencia Ficción</option>
                </select>
            </div>
            <div class="form-group">
                <label>Imagen del libro</label>
                <input type="file" id="prodImagen" accept="image/*">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-primary" onclick="saveProduct()">Guardar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="confirm-modal">
        <div class="confirm-body">
            <div class="confirm-icon">🗑️</div>
            <h3>¿Eliminar producto?</h3>
            <p id="confirmText">Esta acción no se puede deshacer.</p>
        </div>
        <div class="confirm-footer">
            <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
            <button class="btn-danger" onclick="confirmDelete()">Eliminar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let allProducts = [];
    let deleteId = null;

    async function loadProducts() {
        try {
            const res = await fetch('admin_productos.php?action=list');
            const data = await res.json();
            if (data.status === 'success') {
                allProducts = data.productos;
                renderTable(allProducts);
                updateStats();
            } else {
                showError(data.message || 'Error al cargar productos');
            }
        } catch (e) {
            console.error(e);
            showError('Error de conexión con el servidor.');
        }
    }

    function renderTable(products) {
        const wrap = document.getElementById('tableContent');
        if (products.length === 0) {
            wrap.innerHTML = '<div class="empty-state">No se encontraron productos.</div>';
            return;
        }

        let rows = products.map(p => {
            const stockClass = p.stock == 0 ? 'stock-zero' : (p.stock <= 5 ? 'stock-low' : 'stock-ok');
            const stockLabel = p.stock == 0 ? 'Sin stock' : p.stock;
            const nombre = escHtml(p.nombre ?? '—');
            const detalle = escHtml((p.detalle ?? '').substring(0, 40)) + ((p.detalle ?? '').length > 40 ? '...' : '');
           
            // Lógica de imagen: si no hay, ponemos un placeholder
            const imgPath = p.imagen ? 'img/' + p.imagen : 'img/no-book.jpg';

            return `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <img src="${imgPath}" style="width: 40px; height: 55px; object-fit: cover; border-radius: 3px; background: #eee;">
                            <strong>${nombre}</strong>
                        </div>
                    </td>
                    <td style="color:#777;font-size:0.85rem">${detalle}</td>
                    <td class="td-price">$${Number(p.precio).toLocaleString('es-AR')}</td>
                    <td><span class="stock-badge ${stockClass}">${stockLabel}</span></td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit" onclick="openEditModal(${p.id})">Editar</button>
                            <button class="btn-delete" onclick="askDelete(${p.id}, '${nombre}')">Eliminar</button>
                        </div>
                    </td>
                </tr>`;
        }).join('');

        wrap.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Libro</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = allProducts.length;
        document.getElementById('stat-zero').textContent = allProducts.filter(p => p.stock == 0).length;
        document.getElementById('stat-low').textContent = allProducts.filter(p => p.stock > 0 && p.stock <= 5).length;
    }

    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => (p.nombre ?? '').toLowerCase().includes(q));
        renderTable(filtered);
    }

    function openCreateModal() {
        document.getElementById('modalTitle').textContent = 'Nuevo Producto';
        document.getElementById('productId').value = '';
        document.getElementById('prodNombre').value = '';
        document.getElementById('prodDetalle').value = '';
        document.getElementById('prodPrecio').value = '';
        document.getElementById('prodStock').value = '';
        document.getElementById('prodGenero').value = '';
        document.getElementById('prodImagen').value = '';
        document.getElementById('formModal').classList.add('open');
    }

    function openEditModal(id) {
        const p = allProducts.find(x => x.id == id);
        if (!p) return;
        document.getElementById('modalTitle').textContent = 'Editar Producto';
        document.getElementById('productId').value = p.id;
        document.getElementById('prodNombre').value = p.nombre ?? '';
        document.getElementById('prodDetalle').value = p.detalle ?? '';
        document.getElementById('prodPrecio').value = p.precio ?? '';
        document.getElementById('prodStock').value = p.stock ?? '';
        document.getElementById('prodGenero').value = p.id_genero ?? '';
        document.getElementById('prodImagen').value = '';
        document.getElementById('formModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('formModal').classList.remove('open');
    }

    async function saveProduct() {
        try {
            const id = document.getElementById('productId').value;
            const nombre = document.getElementById('prodNombre').value.trim();
            const detalle = document.getElementById('prodDetalle').value.trim();
            const precio = document.getElementById('prodPrecio').value;
            const stock = document.getElementById('prodStock').value;
            const genero = document.getElementById('prodGenero').value;
            const imagenInput = document.getElementById('prodImagen');

            if (!nombre || precio === '' || stock === '' || !genero) {
                showToast('Completa todos los campos obligatorios.', true);
                return;
            }

            const formData = new FormData();
            formData.append('action', 'save');
            formData.append('id', id);
            formData.append('nombre', nombre);
            formData.append('detalle', detalle);
            formData.append('precio', precio);
            formData.append('stock', stock);
            formData.append('id_genero', genero);

            if (imagenInput.files && imagenInput.files[0]) {
                formData.append('imagen', imagenInput.files[0]);
            }

            const res = await fetch('admin_productos.php', {
                method: 'POST',
                body: formData
            });

            const text = await res.text();
            const data = JSON.parse(text);

            if (data.status === 'success') {
                closeModal();
                showToast(id ? 'Producto actualizado.' : 'Producto creado.');
                loadProducts();
            } else {
                showToast(data.message || 'Error al guardar.', true);
            }
        } catch (e) {
            console.error(e);
            showToast('Error crítico al procesar la respuesta.', true);
        }
    }

    function askDelete(id, name) {
        deleteId = id;
        document.getElementById('confirmText').textContent = `Vas a eliminar "${name}". Esta acción no se puede deshacer.`;
        document.getElementById('confirmModal').classList.add('open');
    }

    function closeConfirm() {
        document.getElementById('confirmModal').classList.remove('open');
        deleteId = null;
    }

    async function confirmDelete() {
        if (!deleteId) return;
        const formData = new FormData();
        formData.append('action', 'delete');
        formData.append('id', deleteId);

        try {
            const res = await fetch('admin_productos.php', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.status === 'success') {
                closeConfirm();
                showToast('Producto eliminado.');
                loadProducts();
            } else {
                showToast(data.message ?? 'Error al eliminar.', true);
            }
        } catch (e) {
            showToast('Error de conexión.', true);
        }
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (isError ? ' error' : '');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function showError(msg) {
        document.getElementById('tableContent').innerHTML = `<div class="empty-state">⚠️ ${msg}</div>`;
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('formModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('confirmModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

    document.addEventListener('DOMContentLoaded', loadProducts);
</script>

</body>
</html>
